services:
  # ---------------------------------------------------------------------------
  # The site: nginx serving the built SPA on :3000
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      args:
        # Vite inlines these into the JS bundle at BUILD time, so they must be
        # present here — not at runtime. Changing them requires a rebuild:
        #   docker compose up -d --build
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        # 'live' | 'coming_soon' — the coming-soon gate in App.tsx.
        VITE_SITE_MODE: ${VITE_SITE_MODE:-live}
        # Canonical origin for index.html canonical/OG tags.
        VITE_PUBLIC_BASE_URL: ${VITE_PUBLIC_BASE_URL:-}
    image: shakur-web
    container_name: shakur-web
    restart: unless-stopped
    expose:
      - '3000'
    # Loopback only. The tunnel is the sole public path in — nothing is exposed
    # on the host's public interface, so there's no port to firewall off.
    # `curl http://127.0.0.1:3000` still works for debugging on the box.
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      # Home-CMS uploads, written by the api service — nginx serves them
      # read-only at /media/ (see nginx.conf).
      - media-uploads:/srv/media:ro
    depends_on:
      api:
        # nginx resolves the api upstream lazily (resolver + variable in
        # nginx.conf), so started is enough — no need to gate on healthy.
        condition: service_started

  # ---------------------------------------------------------------------------
  # Booking/AI API: Node Express on :8787, reachable ONLY through nginx's
  # /api/ proxy — no published ports. Server-side secrets live here (never in
  # VITE_* build args).
  # ---------------------------------------------------------------------------
  api:
    build:
      # Repo root as context: the image also copies ./emails templates.
      context: .
      dockerfile: server/Dockerfile
    image: shakur-api
    container_name: shakur-api
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # PUBLIC_BASE_URL wins; PUBLIC_URL is the pre-v3 name, still passed so an
      # older .env keeps working (see server/lib/shared.js).
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      MEDIA_DIR: /data/media
    volumes:
      # Home-CMS uploads (POST /api/media). Writable here; `web` mounts the
      # same volume read-only. Survives rebuilds; `docker volume rm
      # shakur_website_media-uploads` wipes it (Supabase keeps the replicas).
      - media-uploads:/data/media
    expose:
      - '8787'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8787/api/health']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel: publishes web:3000 at https://shakur.verxyl.com
  #
  # CLI-managed (named tunnel + credentials file), no dashboard token needed.
  # One-time setup:
  #   cloudflared tunnel login          # interactive browser auth
  #   bash scripts/setup-tunnel.sh      # creates tunnel, DNS, ./cloudflared/*
  # ---------------------------------------------------------------------------
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: shakur-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      # config.yml + credentials.json, generated by scripts/setup-tunnel.sh.
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      web:
        # Wait for nginx to answer its healthcheck before advertising the origin,
        # so the tunnel never briefly serves 502s on a fresh deploy.
        condition: service_healthy

volumes:
  # Local-first Home-CMS uploads: api writes /data/media, web serves /srv/media.
  media-uploads:
