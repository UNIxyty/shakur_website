server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The Cloudflare tunnel terminates TLS upstream, so never rewrite to an
  # absolute http:// URL on a redirect.
  absolute_redirect off;

  server_tokens off;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_vary on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Fingerprinted assets and self-hosted fonts never change under a given name.
  # One Cache-Control header only — `expires` would emit a second, competing one.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /fonts/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Images are swappable (the admin can replace a cover), so keep this shorter.
  location /images/ {
    add_header Cache-Control "public, max-age=2592000" always;
  }

  # Home-CMS uploads — the `media-uploads` compose volume, written by the api
  # service (POST /api/media) and mounted read-only here at /srv/media. Same
  # cache policy as /images/. The security headers are repeated on purpose:
  # add_header does not merge across levels (see the /index.html block).
  location /media/ {
    alias /srv/media/;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  # index.html must never be cached, or a client pins to a stale asset manifest
  # and starts requesting JS bundles that no longer exist.
  #
  # The security headers are repeated here on purpose: nginx's add_header does not
  # merge across levels — any add_header in this block would otherwise DROP the
  # server-level ones, and since `try_files` internally redirects here, that would
  # silently strip them from every HTML response.
  location = /index.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Client-side routing: unknown paths fall through to the SPA, so a hard refresh
  # on /projects or /admin/login resolves instead of 404ing. Note this only
  # applies here — a missing /fonts/x.woff2 still correctly 404s.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Booking/AI API — proxied to the `api` compose service. The variable +
  # Docker's embedded DNS resolver make nginx resolve `api` lazily per
  # request: nginx still boots (and serves the static site) if the api
  # container is down, instead of failing at startup.
  # No add_header here on purpose — this block inherits the server-level
  # security headers (add_header does not merge across levels).
  location /api/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:8787;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 0;
  }
}
